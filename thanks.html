<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%2304384c'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Georgia,serif' font-size='32' font-weight='500' fill='white'%3EK%3C/text%3E%3C/svg%3E">

<title>お問い合わせ送信完了｜KIZUNA合同会社</title>

<style>
  :root {
    --bg: #ffffff;
    --text: #2a2a2a;
    --muted: #6b6b6b;
    --accent: #04384c;
    --accent-dark: #032a3a;
    --border: #e0e0e0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.85; font-size: 16px;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  header.site {
    background: rgba(255,255,255,0.96);
    padding: 16px 32px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  header.site .logo {
    font-family: "Hiragino Mincho ProN", serif;
    font-size: 20px; color: var(--accent-dark);
    font-weight: 600; text-decoration: none;
  }
  main.thanks {
    flex: 1;
    max-width: 640px;
    margin: 0 auto;
    padding: 80px 24px;
    text-align: center;
  }
  .check-circle {
    width: 80px; height: 80px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 auto 28px;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 44px;
    box-shadow: 0 8px 24px rgba(4,56,76,0.18);
  }
  h1 {
    font-family: "Hiragino Mincho ProN", serif;
    font-size: 28px;
    font-weight: 500;
    margin: 0 0 16px;
    color: var(--accent-dark);
  }
  p {
    color: #444;
    line-height: 2;
    margin: 0 0 16px;
    font-size: 15.5px;
  }
  .info {
    background: #f7f7f5;
    padding: 22px 26px;
    border-radius: 8px;
    margin: 36px 0 32px;
    font-size: 14.5px;
    line-height: 1.95;
    text-align: left;
  }
  .info strong { color: var(--accent-dark); }
  a.back-btn {
    display: inline-block;
    padding: 14px 32px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    border-radius: 999px;
    font-weight: 600;
    font-size: 15px;
    transition: transform .2s;
  }
  a.back-btn:hover { transform: translateY(-2px); }

  footer.site {
    background: #1a1a1a;
    color: #b0b0b0;
    padding: 30px 24px;
    text-align: center;
    font-size: 13px;
  }
  footer.site .copy { font-size: 12px; color: #707070; }

  @media (max-width: 600px) {
    main.thanks { padding: 60px 18px; }
    h1 { font-size: 22px; }
    .check-circle { width: 64px; height: 64px; font-size: 36px; }
  }
</style>
</head>
<body>

<header class="site">
  <a href="/" class="logo">KIZUNA合同会社</a>
</header>

<main class="thanks">
  <div class="check-circle">✓</div>
  <h1>お問い合わせを<br>受け付けました</h1>
  <p>
    ご連絡ありがとうございます。<br>
    内容を確認のうえ、運営担当より<strong>1〜3営業日以内</strong>にご返信いたします。
  </p>

  <div class="info">
    <strong>このあとについて</strong><br>
    ・ ご記入いただいたメールアドレス宛にご返信いたします<br>
    ・ 迷惑メールフォルダに振り分けられる場合があります<br>
    ・ 5営業日経っても返信がない場合は、再度お問い合わせフォームよりご連絡ください
  </div>

  <a href="/" class="back-btn">トップへ戻る</a>
</main>

<footer class="site">
  <div class="copy">© 2026 KIZUNA LLC. All rights reserved.</div>
</footer>

</body>
</html>
